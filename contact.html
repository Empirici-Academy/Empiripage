<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Get in touch with Empirici Academy. We're here to answer your questions about courses, enrollment, and partnerships.">
    <title>Contact Us - Empirici Academy</title>
    <link rel="icon" type="image/svg+xml" href="assets/logo.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" href="css/style.css" as="style">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <a href="#main-content" class="skip-link">Skip to main content</a>
    
    <header class="header" id="header">
        <nav class="container nav-container">
            <a href="index.html" class="logo">
                <img src="assets/logo.svg" alt="Empirici Academy" class="logo-image" width="40" height="40">
                <span class="logo-text">Empirici Academy</span>
            </a>
            
            <button class="hamburger" id="hamburger" aria-label="Toggle navigation menu" aria-expanded="false">
                <span class="hamburger-line"></span>
                <span class="hamburger-line"></span>
                <span class="hamburger-line"></span>
            </button>
            
            <ul class="nav-menu" id="nav-menu">
                <li><a href="index.html" class="nav-link">Home</a></li>
                <li><a href="about.html" class="nav-link">About</a></li>
                <li><a href="courses.html" class="nav-link">Courses</a></li>
                <li><a href="blog.html" class="nav-link">Blog</a></li>
                <li><a href="collaboration.html" class="nav-link">Collaborate</a></li>
                <li><a href="contact.html" class="nav-link active" aria-current="page">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <main id="main-content">
        <section class="page-hero">
            <div class="container">
                <div class="page-hero-content fade-in">
                    <h1 class="page-hero-title">Get in <span class="highlight">Touch</span></h1>
                    <p class="page-hero-subtitle">Have questions about our courses or want to enroll? We're here to help!</p>
                </div>
            </div>
        </section>

        <section class="section">
            <div class="container">
                <div class="contact-layout">
                    <div>
                        <h2 style="margin-bottom: 2rem;">Send Us a Message</h2>
                        
                        <form id="contact-form" novalidate>
                            <div class="form-group">
                                <label for="name" class="form-label">Full Name <span class="required">*</span></label>
                                <input type="text" id="name" name="name" class="form-input" required aria-required="true">
                                <span class="form-error" style="display: none;"></span>
                            </div>

                            <div class="form-group">
                                <label for="email" class="form-label">Email Address <span class="required">*</span></label>
                                <input type="email" id="email" name="email" class="form-input" required aria-required="true">
                                <span class="form-error" style="display: none;"></span>
                            </div>

                            <div class="form-group">
                                <label for="phone" class="form-label">Phone Number</label>
                                <input type="tel" id="phone" name="phone" class="form-input">
                            </div>

                            <div class="form-group">
                                <label for="subject" class="form-label">Subject <span class="required">*</span></label>
                                <select id="subject" name="subject" class="form-select" required aria-required="true">
                                    <option value="">Select a subject</option>
                                    <option value="course-inquiry">Course Inquiry</option>
                                    <option value="enrollment">Enrollment</option>
                                    <option value="partnership">Partnership Opportunity</option>
                                    <option value="technical-support">Technical Support</option>
                                    <option value="other">Other</option>
                                </select>
                                <span class="form-error" style="display: none;"></span>
                            </div>

                            <div class="form-group">
                                <label for="message" class="form-label">Message <span class="required">*</span></label>
                                <textarea id="message" name="message" class="form-textarea" rows="6" required aria-required="true"></textarea>
                                <span class="form-error" style="display: none;"></span>
                            </div>

                            <button type="submit" class="btn btn-primary btn-large" style="width: 100%;">
                                Send Message
                            </button>
                        </form>
                    </div>

                    <div id="contact-info-container">
                        <!-- Contact info loaded dynamically from site settings -->
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer" role="contentinfo" id="site-footer">
        <!-- Footer populated dynamically -->
    </footer>

    <script src="js/main.js" defer></script>
    <script src="js/site-content-default.js" defer></script>
    <script>
        // Contact form submission WITH GOOGLE SHEETS INTEGRATION
        const scriptURL = 'https://script.google.com/macros/s/AKfycbzdyzzD3ac4SDwucEJ2XUQgt2GkalyfVJPJEiAUXhACPPyfOz9qTiRuQ37HeQxLOVhi/exec';
        const form = document.getElementById('contact-form');
        const submitBtn = form.querySelector('button[type="submit"]');

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            
            if (!window.validateForm || !window.validateForm('contact-form')) {
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerHTML = `
                <svg style="display: inline-block; width: 20px; height: 20px; animation: spin 1s linear infinite;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10" stroke-opacity="0.25"/>
                    <path d="M12 2a10 10 0 0 1 10 10" stroke-linecap="round"/>
                </svg>
                Sending...
            `;

            const formData = new FormData(form);
            formData.append('timestamp', new Date().toLocaleString('en-US', {
                year: 'numeric',
                month: 'long',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            }));

            fetch(scriptURL, {
                method: 'POST',
                body: formData
            })
            .then(response => {
                console.log('Success!', response);
                
                const messageData = {
                    name: formData.get('name'),
                    email: formData.get('email'),
                    phone: formData.get('phone'),
                    subject: formData.get('subject'),
                    message: formData.get('message'),
                    timestamp: formData.get('timestamp')
                };
                
                const messages = JSON.parse(localStorage.getItem('contactMessages') || '[]');
                messages.push(messageData);
                localStorage.setItem('contactMessages', JSON.stringify(messages));
                
                window.location.href = 'thank-you.html';
            })
            .catch(error => {
                console.error('Error!', error.message);
                alert('There was an error sending your message. Please try again or contact us directly at info@empirici.academy');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Send Message';
            });
        });

        const style = document.createElement('style');
        style.textContent = `
            @keyframes spin {
                from { transform: rotate(0deg); }
                to { transform: rotate(360deg); }
            }
            .contact-layout {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 4rem;
                align-items: start;
            }
            @media (max-width: 968px) {
                .contact-layout {
                    grid-template-columns: 1fr;
                    gap: 3rem;
                }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
